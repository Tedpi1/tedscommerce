{% extends "base.html" %}
{% load static %}
{% block title %}
<title> Sign-Up</title>
{% endblock title %}
{% block content %}
<div class="container">
    <div class="row">
        <form method="POST" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <section class="form-container">
                <div class="form-group">
                    <h1 class="text">Fill the Form Below to Register</h1>
                    <input type="text" class="form-control" id="firstname" placeholder="firstname"required>
                    <input type="text" class="form-control" id="lastname" placeholder="lastname"required>
                    <input type="email" class="form-control" id="email" placeholder="email"required>
                    <input type="number" class="form-control" id="phone" placeholder="phone"required>
                    <input type="password" class="form-control" id="password" name="password" placeholder="password" required>
                    <input type="password" class="form-control" id="password1" name="password1" placeholder="Confirm Password" required>
                    <div class="account-auth">
                        <button type="submit" class="btn">Sign-Up</button>
                        <a class="login-link" href="#">Already have An account ?</a>
                    </div>
                </div>
            </section>
            
        </form>
    </div>
</div>
{% endblock content %}
